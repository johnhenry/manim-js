name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: npm ci

      - run: npm run type-check

      - run: npm test

      - run: npm run build

  demo-smoke:
    # Three representative demos per parity suite, rendered end-to-end at
    # low quality — a real net over render()/ffmpeg/fonts that unit tests
    # can't cast. One matrix job per suite (roadmap policy: consolidate
    # smoke jobs into a matrix once there are more than four suites).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: showcase-parity
            demos: "01-hackreels 09-submagic 13-electricity-maps"
          - suite: manim-parity
            demos: "02-BraceAnnotation 16-GraphAreaPlot 25-ThreeDSurfacePlot"
          - suite: motion-canvas-parity
            demos: "01-quickstart 06-camera 21-code"
          - suite: d3-parity
            demos: "11-treemap 16-force-directed-graph 06-bar-chart-race"
          - suite: threeb1b-parity
            demos: "01-fourier-epicycles 02-linear-transformation 08-taylor-series"
          - suite: mermaid-parity
            demos: "01-flowchart 02-sequence 13-diagram-diff"
          - suite: lottie-parity
            demos: "01-bodymovin 02-gatin 05-navidad"
          - suite: echarts-parity
            demos: "06-gauge 08-candlestick 01-bar-race"
          - suite: gsap-parity
            demos: "02-stagger-distributions 04-shape-morph 05-motion-path-autorotate"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - run: npm ci

      - name: Render ${{ matrix.suite }} smoke demos (low quality)
        env:
          ECMANIM_DEMO_QUALITY: low
        run: |
          for f in ${{ matrix.demos }}; do
            node --experimental-strip-types --no-warnings "examples/${{ matrix.suite }}/$f.ts"
          done

      - name: Verify outputs are real videos
        run: |
          for f in ${{ matrix.demos }}; do
            path="examples/${{ matrix.suite }}/out/$f.mp4"
            size=$(stat -c%s "$path")
            echo "$path: $size bytes"
            test "$size" -gt 5000
            ffprobe -v error -select_streams v -show_entries stream=codec_type -of csv=p=0 "$path" | grep -q video
          done
