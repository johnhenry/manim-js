<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ecmanim — browser demo</title>
  <style>
    body { margin: 0; background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem; }
    canvas { width: 80vw; max-width: 960px; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.5); background:#000; }
    button { background:#238636; color:#fff; border:0; padding:.6rem 1.2rem; border-radius:6px; font-size:1rem; cursor:pointer; }
    h1 { font-weight: 600; }
    code { background:#161b22; padding:.15rem .4rem; border-radius:4px; }
  </style>
</head>
<body>
  <h1>ecmanim runs in the browser</h1>
  <p>Same <code>Scene</code>, mobjects and animations as the Node build — no server-side rendering.</p>
  <canvas id="stage" width="1280" height="720"></canvas>
  <div>
    <button id="replay">▶ Replay</button>
    <button id="download">⬇ Download WebM</button>
  </div>

  <script type="module">
    import {
      play, record, Scene, Circle, Square, Text, Create, Write, Transform,
      FadeOut, Shift, Rotate, BLUE, GREEN, YELLOW, RED, VGroup, RegularPolygon,
    } from "../../dist/browser.js";

    class Demo extends Scene {
      async construct() {
        const title = new Text("ecmanim", { fontSize: 1, color: YELLOW, point: [0, 3, 0] });
        await this.play(new Write(title));

        const poly = new RegularPolygon(6, { radius: 1.6, color: BLUE, fillColor: BLUE, fillOpacity: 0.4 });
        poly.moveTo([-3, -0.5, 0]);
        const sq = new Square({ sideLength: 2.4, color: GREEN, fillColor: GREEN, fillOpacity: 0.4 });
        sq.moveTo([3, -0.5, 0]);
        await this.play(new Create(poly), new Create(sq));
        await this.play(new Rotate(poly, Math.PI), new Transform(sq, new Circle({ radius: 1.3, color: RED, fillColor: RED, fillOpacity: 0.4 }).moveTo([3, -0.5, 0])));
        await this.wait(0.4);
        await this.play(new FadeOut(poly), new FadeOut(sq), new FadeOut(title));
      }
    }

    const canvas = document.getElementById("stage");
    const run = () => play(Demo, { canvas, quality: "medium", background: "#0d1117" });
    run();
    document.getElementById("replay").onclick = run;
    document.getElementById("download").onclick = async () => {
      const blob = await record(Demo, { quality: "high", background: "#0d1117" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "ecmanim-demo.webm";
      a.click();
    };
  </script>
</body>
</html>
